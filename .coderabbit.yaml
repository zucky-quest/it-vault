language: "ja"
early_access: false
reviews:
  request_changes_workflow: true
  high_level_summary: true
  review_status: true
  collapse_walkthrough: false
  path_instructions:
    - path: "**/article/*.{md}"
      instructions: |
        "あなたは記事の読者です。
        .cursor/rules/globals.mdc のルールに従ってレビューしてください。

        以下の観点で記事を評価してください：
        - 記事の目的と対象読者の明確性
        - 技術的精度と実用性
        - 読みやすさと構成の論理性
        - コード例の適切性と説明の充実度
        - 専門用語の説明の分かりやすさ"
  auto_review:
    enabled: true
    ignore_title_keywords:
      - "WIP"
      - "DO NOT MERGE"
    drafts: false
    base_branches:
      - "feature/.*"
chat:
  auto_reply: true
